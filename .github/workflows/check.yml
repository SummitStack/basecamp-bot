name: Basecamp Bot

on:
  schedule:
    - cron: '30 11 * * *'
    - cron: '30 13 * * *'
    - cron: '30 15 * * *'
    - cron: '30 17 * * *'
    - cron: '30 19 * * *'
    - cron: '30 21 * * *'
    - cron: '30 23 * * *'
    - cron: '30 1 * * *'
    - cron: '30 3 * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run checker
        run: python checker.py
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
